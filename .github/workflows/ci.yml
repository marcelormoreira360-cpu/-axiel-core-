# CI — typecheck, paridade i18n e testes unitários.
# Sem deploy e sem secrets: roda apenas verificações estáticas.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 24
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Typecheck (tsconfig.check.json)
        run: npm run typecheck

      - name: Verificar i18n (paridade PT/EN + ICU)
        run: npm run verify:i18n

      - name: Testes (vitest)
        run: npm test
